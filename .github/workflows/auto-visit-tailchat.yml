name: Auto Visit TailChat

on:
  schedule:
    # 每天北京时间6:00-22:00之间每小时运行一次
    - cron: '0 22-14 * * *'  # UTC时间22点-14点（北京时间6点-22点）
  workflow_dispatch:  # 支持手动触发
    inputs:
      target_url:
        description: '目标URL'
        required: false
        default: 'https://chat.mk49.cyou/'
      actions_to_perform:
        description: '要执行的操作'
        required: false
        default: 'visit,login,check_friends'
        type: choice
        options:
        - visit
        - visit,login
        - visit,login,check_friends
        - full_automation

jobs:
  visit-tailchat:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright selenium requests beautifulsoup4 lxml
        
    - name: Install Playwright browsers
      run: |
        python -m playwright install chromium
        python -m playwright install-deps
        
    - name: Create automation script
      run: |
        cat > auto_visit.py << 'EOF'
"""
TailChat 网站自动化访问脚本
用于在GitHub Actions中自动访问 https://chat.mk49.cyou/
"""
import os
import time
import json
import requests
from datetime import datetime
from urllib.parse import urlparse
from playwright.sync_api import sync_playwright, TimeoutError as PlaywrightTimeoutError

class TailChatAutomation:
    def __init__(self, headless=True):
        self.headless = headless
        self.browser = None
        self.context = None
        self.page = None
        self.base_url = "https://chat.mk49.cyou"
        self.results = {
            "timestamp": datetime.now().isoformat(),
            "success": False,
            "actions_performed": [],
            "errors": [],
            "screenshots": []
        }
        
    def log_action(self, action, success=True, details=""):
        """记录执行的操作"""
        self.results["actions_performed"].append({
            "action": action,
            "timestamp": datetime.now().isoformat(),
            "success": success,
            "details": details
        })
        
        status = "✅" if success else "❌"
        print(f"{status} {action}: {details}")
        
    def take_screenshot(self, name):
        """截取屏幕截图"""
        try:
            screenshot_path = f"/tmp/{name}_{int(time.time())}.png"
            self.page.screenshot(path=screenshot_path, full_page=True)
            self.results["screenshots"].append({
                "name": name,
                "path": screenshot_path
            })
            return screenshot_path
        except Exception as e:
            print(f"截图失败: {e}")
            return None
    
    def setup_browser(self):
        """设置浏览器"""
        try:
            playwright = sync_playwright().start()
            self.browser = playwright.chromium.launch(
                headless=self.headless,
                args=['--no-sandbox', '--disable-dev-shm-usage']
            )
            self.context = self.browser.new_context(
                viewport={'width': 1920, 'height': 1080},
                user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            )
            self.page = self.context.new_page()
            self.log_action("setup_browser", True, "浏览器初始化成功")
            return True
        except Exception as e:
            self.log_action("setup_browser", False, str(e))
            return False
    
    def visit_homepage(self):
        """访问首页"""
        try:
            self.page.goto(self.base_url, wait_until="networkidle", timeout=30000)
            time.sleep(3)
            
            # 检查页面标题或特定元素
            title = self.page.title()
            current_url = self.page.url
            
            self.take_screenshot("homepage")
            
            self.log_action("visit_homepage", True, 
                          f"访问成功 - 标题: {title}, URL: {current_url}")
            return True
        except Exception as e:
            self.log_action("visit_homepage", False, str(e))
            return False
    
    def check_login_status(self):
        """检查登录状态"""
        try:
            # 检查是否有登录相关的元素
            login_elements = [
                'input[type="text"]',
                'input[type="password"]',
                'button:has-text("登录")',
                'button:has-text("Login")',
                'a[href*="login"]'
            ]
            
            for selector in login_elements:
                elements = self.page.query_selector_all(selector)
                if len(elements) > 0:
                    self.log_action("check_login_status", True, 
                                  f"检测到登录元素: {selector}")
                    return False  # 需要登录
            
            # 检查是否有用户头像或已登录的标识
            user_elements = [
                'img[src*="avatar"]',
                'div[class*="user"]',
                'span[class*="username"]'
            ]
            
            for selector in user_elements:
                elements = self.page.query_selector_all(selector)
                if len(elements) > 0:
                    self.log_action("check_login_status", True, 
                                  f"检测到用户元素，可能已登录: {selector}")
                    return True  # 可能已登录
            
            self.log_action("check_login_status", True, "登录状态检查完成")
            return False
        except Exception as e:
            self.log_action("check_login_status", False, str(e))
            return False
    
    def navigate_to_friends(self):
        """导航到好友页面"""
        try:
            # 从JSON记录中提取的导航路径
            friends_url = f"{self.base_url}/main/personal/friends"
            
            # 尝试直接访问好友页面
            self.page.goto(friends_url, wait_until="networkidle", timeout=30000)
            time.sleep(3)
            
            # 检查是否成功到达好友页面
            current_url = self.page.url
            if "friends" in current_url or "personal" in current_url:
                self.take_screenshot("friends_page")
                self.log_action("navigate_to_friends", True, 
                              f"成功导航到好友页面: {current_url}")
                return True
            else:
                # 尝试通过点击导航
                self.log_action("navigate_to_friends", False, 
                              f"未能直接访问好友页面，尝试其他方式")
                return self._navigate_using_clicks()
                
        except Exception as e:
            self.log_action("navigate_to_friends", False, str(e))
            return False
    
    def _navigate_using_clicks(self):
        """通过点击导航（基于JSON记录）"""
        try:
            # 尝试点击用户头像（从JSON记录中提取的选择器）
            avatar_selectors = [
                'img[src*="static/files"]',
                'div[class*="avatar"] img',
                'img[draggable="false"]'
            ]
            
            for selector in avatar_selectors:
                try:
                    self.page.wait_for_selector(selector, timeout=5000)
                    self.page.click(selector)
                    time.sleep(2)
                    self.log_action("click_avatar", True, f"点击头像: {selector}")
                    break
                except:
                    continue
            
            # 尝试点击"好友"或相关菜单
            friend_selectors = [
                'a[href*="friends"]',
                'button:has-text("好友")',
                'div:has-text("好友")',
                'span:has-text("好友")'
            ]
            
            for selector in friend_selectors:
                try:
                    self.page.wait_for_selector(selector, timeout=5000)
                    self.page.click(selector)
                    time.sleep(3)
                    self.take_screenshot("after_friend_click")
                    self.log_action("click_friends", True, f"点击好友菜单: {selector}")
                    return True
                except:
                    continue
            
            return False
        except Exception as e:
            self.log_action("_navigate_using_clicks", False, str(e))
            return False
    
    def check_friend_list(self):
        """检查好友列表"""
        try:
            # 等待好友列表加载
            time.sleep(3)
            
            # 查找好友列表元素
            friend_list_selectors = [
                'div[class*="friend"]',
                'div[class*="list"]',
                'div[class*="item"]',
                'div:has-text("暗星")'  # 从JSON记录中看到的好友名
            ]
            
            friend_count = 0
            for selector in friend_list_selectors:
                friends = self.page.query_selector_all(selector)
                if len(friends) > 0:
                    friend_count = len(friends)
                    self.log_action("check_friend_list", True, 
                                  f"找到 {friend_count} 个好友列表元素 (选择器: {selector})")
                    
                    # 截取好友列表
                    self.take_screenshot("friend_list")
                    return True
            
            self.log_action("check_friend_list", True, "未找到好友列表，可能为空")
            return True  # 即使没有好友也返回成功
            
        except Exception as e:
            self.log_action("check_friend_list", False, str(e))
            return False
    
    def perform_test_actions(self):
        """执行测试操作（基于JSON记录）"""
        try:
            actions = []
            
            # 1. 尝试点击设置按钮（从JSON记录）
            try:
                self.page.wait_for_selector('div.wip-tab:has-text("⚙️ 设置")', timeout=5000)
                self.page.click('div.wip-tab:has-text("⚙️ 设置")')
                time.sleep(1)
                actions.append("click_settings")
                self.log_action("click_settings", True, "点击设置按钮")
            except:
                pass
            
            # 2. 尝试点击开关（从JSON记录）
            try:
                self.page.wait_for_selector('#switch-auto', timeout=5000)
                self.page.click('#switch-auto')
                time.sleep(1)
                actions.append("toggle_switch")
                self.log_action("toggle_switch", True, "点击自动开关")
            except:
                pass
            
            # 3. 尝试点击检测器按钮
            try:
                self.page.wait_for_selector('#wip-trigger', timeout=5000)
                self.page.click('#wip-trigger')
                time.sleep(1)
                actions.append("open_inspector")
                self.log_action("open_inspector", True, "打开检测器")
            except:
                pass
            
            self.log_action("perform_test_actions", True, 
                          f"执行了 {len(actions)} 个测试操作: {actions}")
            return True
        except Exception as e:
            self.log_action("perform_test_actions", False, str(e))
            return False
    
    def check_website_health(self):
        """检查网站健康状态"""
        try:
            # 检查HTTP状态
            response = requests.get(self.base_url, timeout=10)
            http_status = response.status_code
            
            # 检查页面加载时间
            start_time = time.time()
            self.page.reload(wait_until="networkidle")
            load_time = time.time() - start_time
            
            health_info = {
                "http_status": http_status,
                "load_time": round(load_time, 2),
                "timestamp": datetime.now().isoformat()
            }
            
            self.log_action("check_website_health", True, 
                          f"HTTP状态: {http_status}, 加载时间: {load_time:.2f}秒")
            return health_info
        except Exception as e:
            self.log_action("check_website_health", False, str(e))
            return None
    
    def run(self, actions="visit,check_friends"):
        """运行自动化流程"""
        try:
            print(f"🚀 开始TailChat自动化访问 - {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
            print(f"目标URL: {self.base_url}")
            print(f"执行操作: {actions}")
            
            # 设置浏览器
            if not self.setup_browser():
                return self.results
            
            action_list = actions.split(",")
            
            # 执行请求的操作
            for action in action_list:
                action = action.strip()
                
                if action == "visit":
                    self.visit_homepage()
                    
                elif action == "check_login":
                    self.check_login_status()
                    
                elif action == "navigate_friends":
                    self.navigate_to_friends()
                    
                elif action == "check_friends":
                    if self.visit_homepage():
                        self.navigate_to_friends()
                        self.check_friend_list()
                        
                elif action == "test_actions":
                    self.perform_test_actions()
                    
                elif action == "health_check":
                    self.check_website_health()
                    
                elif action == "full_automation":
                    self.visit_homepage()
                    self.check_login_status()
                    self.navigate_to_friends()
                    self.check_friend_list()
                    self.perform_test_actions()
                    self.check_website_health()
            
            # 最终健康检查
            health = self.check_website_health()
            if health:
                self.results["health_check"] = health
            
            # 统计成功操作
            successful_actions = sum(1 for a in self.results["actions_performed"] if a["success"])
            total_actions = len(self.results["actions_performed"])
            
            self.results["success"] = successful_actions / total_actions > 0.5 if total_actions > 0 else False
            self.results["summary"] = {
                "total_actions": total_actions,
                "successful_actions": successful_actions,
                "success_rate": round(successful_actions / total_actions * 100, 2) if total_actions > 0 else 0
            }
            
            print(f"\n📊 自动化执行完成:")
            print(f"   总操作数: {total_actions}")
            print(f"   成功操作: {successful_actions}")
            print(f"   成功率: {self.results['summary']['success_rate']}%")
            
            return self.results
            
        except Exception as e:
            self.log_action("run", False, f"自动化流程异常: {str(e)}")
            self.results["success"] = False
            return self.results
        finally:
            # 清理资源
            if self.page:
                self.page.close()
            if self.context:
                self.context.close()
            if self.browser:
                self.browser.close()
    
    def save_results(self, filename="automation_results.json"):
        """保存结果到文件"""
        try:
            with open(filename, 'w', encoding='utf-8') as f:
                json.dump(self.results, f, ensure_ascii=False, indent=2)
            self.log_action("save_results", True, f"结果已保存到 {filename}")
            return filename
        except Exception as e:
            self.log_action("save_results", False, str(e))
            return None

def main():
    """主函数"""
    import argparse
    
    parser = argparse.ArgumentParser(description='TailChat网站自动化访问')
    parser.add_argument('--url', default='https://chat.mk49.cyou/', help='目标URL')
    parser.add_argument('--actions', default='visit,check_friends', help='要执行的操作')
    parser.add_argument('--headless', action='store_true', default=True, help='无头模式')
    parser.add_argument('--output', default='automation_results.json', help='输出文件')
    
    args = parser.parse_args()
    
    # 创建自动化实例
    automator = TailChatAutomation(headless=args.headless)
    automator.base_url = args.url.rstrip('/')
    
    # 运行自动化
    results = automator.run(args.actions)
    
    # 保存结果
    automator.save_results(args.output)
    
    # 输出总结
    if results["success"]:
        print("\n🎉 自动化访问成功完成！")
        exit(0)
    else:
        print("\n⚠️  自动化访问部分失败，请检查日志")
        exit(1)

if __name__ == "__main__":
    main()
EOF
        
    - name: Run automation script
      env:
        TARGET_URL: ${{ github.event.inputs.target_url || 'https://chat.mk49.cyou/' }}
        ACTIONS: ${{ github.event.inputs.actions_to_perform || 'visit,check_friends' }}
      run: |
        echo "目标URL: $TARGET_URL"
        echo "执行操作: $ACTIONS"
        
        # 运行自动化脚本
        python auto_visit.py \
          --url "$TARGET_URL" \
          --actions "$ACTIONS" \
          --headless \
          --output automation_results.json
        
        # 检查结果
        if [ -f automation_results.json ]; then
          echo "自动化结果:"
          cat automation_results.json | python -m json.tool | head -100
        fi
        
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tailchat-automation-results
        path: |
          automation_results.json
          /tmp/*.png
        retention-days: 7
        
    - name: Send notification
      if: always()
      run: |
        if [ -f automation_results