name: Run TailChat AI Bot

on:
  workflow_dispatch:  # 手动触发
    inputs:
      run_duration:
        description: '运行时长（分钟）'
        required: false
        default: '60'
        type: choice
        options:
        - '30'
        - '60'
        - '120'
        - '240'
        - '480'
  schedule:
    # 每天UTC时间22点运行（北京时间6点），运行8小时
    - cron: '0 22 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.inputs.run_duration || 480 }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create environment file
      env:
        TAILCHAT_API_URL: ${{ secrets.TAILCHAT_API_URL || 'https://chat.mk49.cyou' }}
        TAILCHAT_APP_ID: ${{ secrets.TAILCHAT_APP_ID }}
        TAILCHAT_APP_SECRET: ${{ secrets.TAILCHAT_APP_SECRET }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        ACTIVE_MESSAGE_USERS: ${{ secrets.ACTIVE_MESSAGE_USERS || '' }}
      run: |
        echo "创建环境配置文件..."
        cat > .env << EOF
# TailChat 配置
TAILCHAT_API_URL=$TAILCHAT_API_URL
TAILCHAT_APP_ID=$TAILCHAT_APP_ID
TAILCHAT_APP_SECRET=$TAILCHAT_APP_SECRET
TAILCHAT_BOT_USERNAME=AI助手
TAILCHAT_BOT_AVATAR=

# DeepSeek API 配置
DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
DEEPSEEK_API_URL=https://api.deepseek.com/v1/chat/completions
DEEPSEEK_MODEL=deepseek-chat

# 机器人行为配置
BOT_ACTIVE_HOURS_START=6
BOT_ACTIVE_HOURS_END=22
BOT_AUTO_REPLY=true
BOT_AUTO_REPLY_PROBABILITY=1.0
BOT_MAX_MESSAGE_LENGTH=1000
WELCOME_MESSAGE=你好！我是AI助手，有什么可以帮你的吗？
BUSY_MESSAGE=我现在不在线，请在6:00-22:00之间联系我。

# Git仓库配置（可选）
GIT_REPO_URL=
GIT_REPO_BRANCH=main
GIT_IMAGE_PATH=images/

# 主动消息配置
ACTIVE_MESSAGE_USERS=$ACTIVE_MESSAGE_USERS
ACTIVE_MESSAGE_INTERVAL=60
EOF
        
        echo "环境文件内容（隐藏敏感信息）:"
        sed 's/\(APP_ID\|APP_SECRET\|API_KEY\)=.*/\1=***/' .env
        
    - name: Create logs directory
      run: |
        mkdir -p logs
        echo "日志目录已创建"
        
    - name: Test configuration
      run: |
        echo "测试配置..."
        python -c "
import sys
sys.path.insert(0, '.')
from config import config

print('配置测试结果:')
print(f'TailChat API URL: {config.tailchat.api_url}')
print(f'TailChat App ID: {'已设置' if config.tailchat.app_id else '未设置'}')
print(f'TailChat App Secret: {'已设置' if config.tailchat.app_secret else '未设置'}')
print(f'DeepSeek API Key: {'已设置' if config.deepseek.api_key else '未设置'}')
print(f'在线时间: {config.behavior.active_hours_start}:00 - {config.behavior.active_hours_end}:00')

if config.validate():
    print('✅ 配置验证通过')
else:
    print('❌ 配置验证失败')
    sys.exit(1)
"
        
    - name: Run the bot
      env:
        PYTHONUNBUFFERED: 1
      run: |
        echo "启动TailChat AI机器人..."
        echo "开始时间: $(date)"
        echo "预计运行时长: ${{ github.event.inputs.run_duration || 480 }}分钟"
        
        # 设置超时时间
        timeout_minutes=$(( ${{ github.event.inputs.run_duration || 480 }} - 5 ))
        
        # 运行机器人（带超时）
        timeout ${timeout_minutes}m python main.py || {
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 124 ]; then
            echo "⏰ 机器人运行超时，正常结束"
          else
            echo "❌ 机器人异常退出，退出码: $EXIT_CODE"
            exit $EXIT_CODE
          fi
        }
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs
        path: |
          logs/
          *.log
        retention-days: 7
        
    - name: Save final status
      if: always()
      run: |
        echo "保存运行状态..."
        cat > run_status.json << EOF
{
  "workflow_run_id": "$GITHUB_RUN_ID",
  "repository": "$GITHUB_REPOSITORY",
  "start_time": "$(date -u -d @$(( $(date +%s) - $SECONDS )) +'%Y-%m-%dT%H:%M:%SZ')",
  "end_time": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
  "duration_seconds": $SECONDS,
  "status": "${{ job.status }}",
  "trigger": "${{ github.event_name }}"
}
EOF
        
        echo "运行状态:"
        cat run_status.json
        
    - name: Upload status
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: run-status
        path: run_status.json
        retention-days: 30
        
    - name: Send success notification
      if: success()
      run: |
        echo "🎉 TailChat AI机器人运行成功！"
        echo "运行时长: $((SECONDS / 60))分钟"
        echo "工作流运行链接: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        
    - name: Send failure notification
      if: failure()
      run: |
        echo "⚠️ TailChat AI机器人运行失败！"
        echo "运行时长: $((SECONDS / 60))分钟"
        echo "工作流运行链接: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        echo "请检查日志了解详情"