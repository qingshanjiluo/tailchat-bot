name: TailChat AI Browser Bot

on:
  workflow_dispatch:  # 手动触发
    inputs:
      run_mode:
        description: '运行模式'
        required: true
        default: 'normal'
        type: choice
        options:
          - 'normal'
          - '24h'
          - 'test'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📥 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libnspr4 \
          libatk1.0-0 \
          libatk-bridge2.0-0 \
          libcups2 \
          libdrm2 \
          libdbus-1-3 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxrandr2 \
          libgbm1 \
          libasound2 \
          libatspi2.0-0 \
          libwayland-client0
          
    - name: 📦 安装Python依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🌐 安装Playwright浏览器
      run: |
        python -m playwright install chromium
        python -m playwright install-deps chromium
        
    - name: ⚙️ 创建环境配置文件
      env:
        TAILCHAT_USERNAME: ${{ secrets.TAILCHAT_USERNAME }}
        TAILCHAT_PASSWORD: ${{ secrets.TAILCHAT_PASSWORD }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        TAILCHAT_API_URL: ${{ secrets.TAILCHAT_API_URL || 'https://chat.mk49.cyou' }}
        
      run: |
        echo "创建环境配置文件..."
        
        # 创建.env文件
        cat > .env << 'EOF'
# TailChat 浏览器自动化配置
TAILCHAT_API_URL=$TAILCHAT_API_URL
TAILCHAT_USERNAME=$TAILCHAT_USERNAME
TAILCHAT_PASSWORD=$TAILCHAT_PASSWORD
TAILCHAT_USE_BROWSER=true
TAILCHAT_HEADLESS=true
TAILCHAT_BOT_USERNAME=AI助手(GitHub)

# DeepSeek API 配置
DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
DEEPSEEK_API_URL=https://api.deepseek.com/v1/chat/completions
DEEPSEEK_MODEL=deepseek-chat

# 机器人行为配置
BOT_ACTIVE_HOURS_START=6
BOT_ACTIVE_HOURS_END=22
BOT_AUTO_REPLY=true

# 对话记录配置
ENABLE_CONVERSATION_HISTORY=true
CONVERSATION_HISTORY_PATH=./conversations

# 日志配置
LOG_LEVEL=INFO
LOG_FILE=logs/bot.log
EOF
        
        echo "环境配置文件创建完成"
        
    - name: 📁 创建必要目录
      run: |
        mkdir -p logs
        mkdir -p conversations
        
    - name: 🤖 启动TailChat浏览器自动化机器人
      run: |
        echo "启动TailChat浏览器自动化机器人..."
        python main_browser.py
        
    - name: 📤 上传日志文件
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs-${{ github.run_id }}
        path: |
          logs/
          conversations/
