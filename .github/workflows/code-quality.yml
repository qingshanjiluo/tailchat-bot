name: Code Quality

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**.py'
      - 'requirements.txt'
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行一次
  workflow_dispatch:  # 手动触发

jobs:
  code-quality:
    name: 🔍 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📦 安装代码检查工具
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy pylint isort bandit safety
        
    - name: 🎨 代码格式化 (Black)
      run: |
        echo "运行代码格式化检查..."
        black --check --diff .
        
    - name: 📋 代码风格检查 (Flake8)
      run: |
        echo "运行Flake8检查..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: 🔍 静态类型检查 (Mypy)
      run: |
        echo "运行Mypy类型检查..."
        mypy --ignore-missing-imports .
        
    - name: 📝 导入排序 (isort)
      run: |
        echo "检查导入排序..."
        isort --check-only --diff .
        
    - name: 📊 代码质量分析 (Pylint)
      run: |
        echo "运行Pylint分析..."
        find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" | xargs pylint --exit-zero
        
    - name: 🔒 依赖安全检查 (Safety)
      run: |
        echo "检查依赖安全漏洞..."
        safety check --full-report
        
    - name: 🛡️ 代码安全扫描 (Bandit)
      run: |
        echo "运行Bandit安全扫描..."
        bandit -r . -f json -o bandit-report.json || true
        
    - name: 📤 上传检查报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports-${{ github.run_id }}
        path: |
          bandit-report.json
          
  auto-fix:
    name: 🔧 自动修复
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📦 安装格式化工具
      run: |
        python -m pip install --upgrade pip
        pip install black isort
        
    - name: 🎨 自动格式化代码 (Black)
      run: |
        echo "自动格式化代码..."
        black .
        
    - name: 📝 自动排序导入 (isort)
      run: |
        echo "自动排序导入..."
        isort .
        
    - name: 📤 提交格式化更改
      if: github.event_name == 'workflow_dispatch'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "style: 自动格式化代码 [skip ci]"
        git push