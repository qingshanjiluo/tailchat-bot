name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.json'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式'
        required: true
        default: 'test'
        type: choice
        options:
          - 'test'
          - 'lint'
          - 'build'
          - 'all'

jobs:
  test:
    name: 🧪 运行测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📥 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libatspi2.0-0 libwayland-client0
          
    - name: 📦 安装Python依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        
    - name: 🌐 安装Playwright浏览器
      run: |
        python -m playwright install chromium
        python -m playwright install-deps chromium
        
    - name: ⚙️ 创建测试环境配置文件
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'test-key' }}
        TAILCHAT_API_URL: 'https://chat.mk49.cyou'
        
      run: |
        echo "创建测试环境配置文件..."
        echo "TAILCHAT_API_URL=$TAILCHAT_API_URL" > .env
        echo "TAILCHAT_USERNAME=test_user" >> .env
        echo "TAILCHAT_PASSWORD=test_password" >> .env
        echo "TAILCHAT_USE_BROWSER=false" >> .env
        echo "TAILCHAT_HEADLESS=true" >> .env
        echo "TAILCHAT_BOT_USERNAME=AI助手(测试)" >> .env
        echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" >> .env
        echo "DEEPSEEK_API_URL=https://api.deepseek.com/v1/chat/completions" >> .env
        echo "DEEPSEEK_MODEL=deepseek-chat" >> .env
        echo "BOT_ACTIVE_HOURS_START=6" >> .env
        echo "BOT_ACTIVE_HOURS_END=22" >> .env
        echo "BOT_AUTO_REPLY=true" >> .env
        echo "ENABLE_CONVERSATION_HISTORY=false" >> .env
        echo "CONVERSATION_HISTORY_PATH=./conversations" >> .env
        echo "LOG_LEVEL=INFO" >> .env
        echo "LOG_FILE=logs/bot.log" >> .env
        echo "GIT_REPO_URL=https://github.com/test/repo.git" >> .env
        echo "GIT_ACCESS_TOKEN=test_token" >> .env
        echo "测试环境配置文件创建完成"
        
    - name: 📁 创建必要目录
      run: |
        mkdir -p logs
        mkdir -p conversations
        
    - name: 🧪 运行单元测试
      run: |
        echo "运行单元测试..."
        python -m pytest test_bot.py -v --tb=short
        
    - name: 📊 生成测试覆盖率报告
      run: |
        echo "生成测试覆盖率报告..."
        python -m pytest test_bot.py --cov=. --cov-report=xml --cov-report=html
        
    - name: 📤 上传测试报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-${{ github.run_id }}
        path: |
          htmlcov/
          coverage.xml
          logs/

  lint:
    name: 🔍 代码质量检查
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📦 安装代码检查工具
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy pylint isort
        
    - name: 🎨 代码格式化检查 (Black)
      run: |
        echo "检查代码格式化..."
        black --check --diff .
        
    - name: 📋 代码风格检查 (Flake8)
      run: |
        echo "运行Flake8检查..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: 🔍 静态类型检查 (Mypy)
      run: |
        echo "运行Mypy类型检查..."
        mypy --ignore-missing-imports .
        
    - name: 📝 导入排序检查 (isort)
      run: |
        echo "检查导入排序..."
        isort --check-only --diff .
        
    - name: 📊 代码质量分析 (Pylint)
      run: |
        echo "运行Pylint分析..."
        find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" | xargs pylint --exit-zero

  security:
    name: 🔒 安全扫描
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📦 安装安全扫描工具
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        
    - name: 🔍 依赖安全检查 (Safety)
      run: |
        echo "检查依赖安全漏洞..."
        safety check --full-report
        
    - name: 🛡️ 代码安全扫描 (Bandit)
      run: |
        echo "运行Bandit安全扫描..."
        bandit -r . -f json -o bandit-report.json || true
        
    - name: 📤 上传安全报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-${{ github.run_id }}
        path: |
          bandit-report.json

  build:
    name: 🐳 Docker构建
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.event_name == 'push' || github.event.inputs.run_mode == 'build' || github.event.inputs.run_mode == 'all'
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 🐳 设置Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 登录到容器注册表
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: 🏗️ 构建Docker镜像
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' }}
        tags: |
          tailchat-ai-bot:latest
          tailchat-ai-bot:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: 📋 镜像扫描
      run: |
        echo "镜像构建完成，可以进行安全扫描"
        
  deploy:
    name: 🚀 部署
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📦 检出代码
      uses: actions/checkout@v4
      
    - name: 📝 生成部署报告
      run: |
        echo "部署准备完成"
        echo "镜像: tailchat-ai-bot:${{ github.sha }}"
        echo "时间: $(date)"
        
    - name: 📤 上传部署配置
      uses: actions/upload-artifact@v4
      with:
        name: deployment-config-${{ github.run_id }}
        path: |
          docker-compose.yml
          Dockerfile
          start.sh