version: '3.8'

services:
  tailchat-ai-bot:
    build: .
    container_name: tailchat-ai-bot
    restart: unless-stopped
    environment:
      # TailChat配置
      - TAILCHAT_API_URL=${TAILCHAT_API_URL:-http://localhost:11000}
      - TAILCHAT_APP_ID=${TAILCHAT_APP_ID}
      - TAILCHAT_APP_SECRET=${TAILCHAT_APP_SECRET}
      - TAILCHAT_BOT_USERNAME=${TAILCHAT_BOT_USERNAME:-AI助手}
      - TAILCHAT_BOT_AVATAR=${TAILCHAT_BOT_AVATAR}
      
      # DeepSeek配置
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      
      # 机器人行为配置
      - BOT_ACTIVE_HOURS_START=${BOT_ACTIVE_HOURS_START:-6}
      - BOT_ACTIVE_HOURS_END=${BOT_ACTIVE_HOURS_END:-22}
      - BOT_AUTO_REPLY=${BOT_AUTO_REPLY:-true}
      - BOT_AUTO_REPLY_PROBABILITY=${BOT_AUTO_REPLY_PROBABILITY:-0.8}
      - BOT_MAX_MESSAGE_LENGTH=${BOT_MAX_MESSAGE_LENGTH:-1000}
      - WELCOME_MESSAGE=${WELCOME_MESSAGE:-你好！我是AI助手，有什么可以帮你的吗？}
      - BUSY_MESSAGE=${BUSY_MESSAGE:-我现在不在线，请在6:00-22:00之间联系我。}
      
      # Git仓库配置（可选）
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GIT_REPO_BRANCH=${GIT_REPO_BRANCH:-main}
      - GIT_IMAGE_PATH=${GIT_IMAGE_PATH:-images/}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - tailchat-network

networks:
  tailchat-network:
    external: ${TAILCHAT_NETWORK_EXTERNAL:-false}